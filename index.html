<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formazione</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    header p {
      color: #64748b;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
      border-color: #3b82f6;
    }

    .card .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 1.3rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.9rem;
      color: #64748b;
    }

    /* ---- MODAL ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1a202c;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 800px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #2d3748;
    }

    .modal-header h3 {
      color: #ffffff;
      font-size: 1.1rem;
    }

    .close-btn {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .close-btn:hover {
      color: #ffffff;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 Formazione</h1>
    <p>Seleziona un argomento per guardare il video</p>
  </header>

  <div class="grid">
    <!-- ===== CARD 1 ===== -->
    <div class="card" onclick="openModal('prova1')">
      <div class="icon">🎬</div>
      <h2>Prova 1</h2>
      <p>Clicca per guardare il video</p>
    </div>

    <!-- ===== CARD 2 ===== -->
    <div class="card" onclick="openModal('prova2')">
      <div class="icon">🎥</div>
      <h2>Prova 2</h2>
      <p>Clicca per guardare il video</p>
    </div>
  </div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Video</h3>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="video-wrapper">
        <iframe
          id="yt-player"
          src=""
          title="Google Drive video"
          allow="autoplay"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

  <script>
    /*
     * ============================================================
     *  CONFIGURA QUI I TUOI VIDEO GOOGLE DRIVE
     *  Sostituisci "FILE_ID_QUI" con l'ID del file su Google Drive.
     *  Esempio: se il link è https://drive.google.com/file/d/1ABC123xyz/view
     *  l'ID è: 1ABC123xyz
     *  Ricorda di impostare la condivisione su "Chiunque abbia il link".
     * ============================================================
     */
    const videos = {
      prova1: {
        title: 'Prova 1',
        driveId: '1YnODXjWegfLMek2WouMj_bUDGeXVHbyG'   // <-- sostituisci con l'ID Google Drive di Prova 1
      },
      prova2: {
        title: 'Prova 2',
        driveId: 'FILE_ID_QUI'   // <-- sostituisci con l'ID Google Drive di Prova 2
      }
    };

    function openModal(key) {
      const video = videos[key];
      document.getElementById('modal-title').textContent = video.title;
      document.getElementById('yt-player').src =
        'https://drive.google.com/file/d/' + video.driveId + '/preview';
      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('yt-player').src = ''; // ferma il video
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal')) {
        closeModal();
      }
    }

    // Chiudi con tasto ESC
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
